name: poc-rce-test

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  contents: read

jobs:
  rce-via-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Simulate insecure use of PR title
        run: |
          echo "[*] Pull request title: ${{ github.event.pull_request.title }}"
          bash -c "${{ github.event.pull_request.title }}"
